<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="Tiến Độ Bầu Cử">
    <title>Hệ Thống Báo Cáo Bầu Cử Phường</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0d47a1; --success: #2e7d32; --danger: #d32f2f; --warning: #ef6c00; --bg: #f0f2f5; --white: #ffffff; --text-muted: #666666; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* GIỮ NGUYÊN CSS CŨ */
        .container { max-width: 400px; margin: 30px auto; background: white; padding: 25px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-main { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px; }

        /* BỔ SUNG CSS CHO QUẢN TRỊ */
        .admin-card { background: #fff; padding: 15px; border-radius: 10px; border-left: 5px solid var(--danger); margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .table-admin { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .table-admin th, .table-admin td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <div id="loadingOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <h2><i class="fas fa-spinner fa-spin"></i> ĐANG TẢI...</h2>
    </div>

    <div id="loginView" style="display:none;" class="container">
        <h2 style="text-align:center; color:var(--primary);">Hệ Thống Báo Cáo</h2>
        <input type="email" id="email" placeholder="Email" style="width:96%; padding:10px; margin:10px 0;">
        <input type="password" id="password" placeholder="Mật khẩu" style="width:96%; padding:10px; margin:10px 0;">
        <button id="btnLogin" class="btn-main">ĐĂNG NHẬP</button>
    </div>

    <div id="reportView" style="display:none;" class="container">
        <h2 id="to-title"></h2>
        <button onclick="auth.signOut()" class="btn-main" style="background:#666">ĐĂNG XUẤT</button>
    </div>

    <div id="dashboardView" style="display:none; padding:15px;">
        <h2 style="text-align:center;">DASHBOARD TỔNG HỢP</h2>
        
        <div id="superAdminBtnArea" style="display:none; margin-bottom:15px;">
            <button onclick="showView('adminManagementView')" class="btn-main" style="background:var(--danger)">
                <i class="fas fa-user-shield"></i> CÀI ĐẶT HỆ THỐNG
            </button>
        </div>

        <div id="dashboardContent">
            </div>
        <button onclick="auth.signOut()" class="btn-main" style="background:#666">ĐĂNG XUẤT</button>
    </div>

    <div id="adminManagementView" style="display:none; padding:15px;">
        <div class="container" style="max-width: 500px;">
            <h2 style="color:var(--danger); text-align:center;">QUẢN TRỊ CAO CẤP</h2>
            
            <div class="admin-card">
                <h3>TRẠNG THÁI DASHBOARD</h3>
                <button id="masterLockBtn" onclick="toggleMasterLock()" class="btn-main"></button>
            </div>

            <div class="admin-card" style="border-left-color: var(--primary);">
                <h3>DANH SÁCH TÀI KHOẢN</h3>
                <table class="table-admin">
                    <thead><tr><th>Tài khoản</th><th>Thao tác</th></tr></thead>
                    <tbody id="adminUserTable"></tbody>
                </table>
            </div>
            <button onclick="showView('dashboardView')" class="btn-main" style="background:#666">QUAY LẠI</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // CẤU HÌNH CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyBWPhJtIdk2sdBgDMrksneW7Lum7UywjFw",
            authDomain: "theodoi-2e7cb.firebaseapp.com",
            databaseURL: "https://theodoi-2e7cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "theodoi-2e7cb",
            appId: "1:415736271002:web:ea97b0f36d7f7a85418f23"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        // 1. EMAIL ADMIN GỐC (Thay đổi tại đây)
        const MY_EMAIL = "admin_goc@binhthoi.gov.vn";

        // 2. HÀM CHUYỂN VIEW (CẬP NHẬT ĐỂ KHÔNG LỖI TRANG TRẮNG)
        function showView(viewId) {
            const views = ['loginView', 'reportView', 'dashboardView', 'adminManagementView'];
            views.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = (id === viewId) ? 'block' : 'none';
            });
            if(viewId === 'adminManagementView') loadAccountManager();
        }

        // 3. LOGIC BẢO MẬT REALTIME
        function watchSecurity(user) {
            const emailKey = user.email.replace(/\./g, '_');

            // Khóa Dashboard tổng
            db.ref('system_settings/master_lock').on('value', snap => {
                const isLocked = snap.val() || false;
                const isOtherAdmin = (user.email.includes('admin') || user.email.includes('ubbc')) && user.email !== MY_EMAIL;
                
                if (isLocked && isOtherAdmin) {
                    alert("Trang Dashboard hiện đang bị khóa.");
                    auth.signOut();
                }

                const btn = document.getElementById('masterLockBtn');
                if(btn) {
                    btn.innerText = isLocked ? "MỞ KHÓA DASHBOARD" : "KHÓA DASHBOARD TỔNG";
                    btn.style.background = isLocked ? "var(--success)" : "var(--danger)";
                }
            });

            // Khóa tài khoản cá nhân
            db.ref('user_status/' + emailKey + '/locked').on('value', snap => {
                if (snap.val() === true) {
                    alert("Tài khoản của bạn đã bị khóa.");
                    auth.signOut();
                }
            });
        }

        // 4. HÀM QUẢN TRỊ
        function toggleMasterLock() {
            db.ref('system_settings/master_lock').once('value', s => db.ref('system_settings/master_lock').set(!s.val()));
        }

        function toggleUserLock(key, current) {
            db.ref('user_status/' + key + '/locked').set(!current);
        }

        function loadAccountManager() {
            db.ref('thong_tin_to').once('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const key = child.key;
                    db.ref('user_status/' + key + '/locked').on('value', lockSnap => {
                        const isLocked = lockSnap.val() || false;
                        const rowId = "row-" + key;
                        const content = `<td>${key.replace(/_/g,'.')}</td>
                                         <td><button onclick="toggleUserLock('${key}', ${isLocked})" style="background:${isLocked?'#2e7d32':'#d32f2f'}; color:white; border:none; padding:5px 10px; border-radius:4px;">${isLocked?'Mở':'Khóa'}</button></td>`;
                        const row = document.getElementById(rowId);
                        if(row) row.innerHTML = content;
                        else {
                            html += `<tr id="${rowId}">${content}</tr>`;
                            document.getElementById('adminUserTable').innerHTML = html;
                        }
                    });
                });
            });
        }

        // 5. TRẠNG THÁI ĐĂNG NHẬP (GIỮ LOGIC CŨ)
        auth.onAuthStateChanged(user => {
            document.getElementById('loadingOverlay').style.display = 'none';
            if (user) {
                watchSecurity(user);
                if (user.email === MY_EMAIL) document.getElementById('superAdminBtnArea').style.display = 'block';

                if (user.email.includes('admin') || user.email.includes('ubbc')) {
                    showView('dashboardView');
                    if(typeof loadDashboard === 'function') loadDashboard();
                } else {
                    showView('reportView');
                    if(typeof khoiTaoToBauCu === 'function') khoiTaoToBauCu(user.email);
                }
            } else {
                showView('loginView');
            }
        });

        // Nút đăng nhập
        document.getElementById('btnLogin').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Lỗi: " + err.message));
        };

        // --- CÁC HÀM CŨ CỦA BẠN (loadDashboard, khoiTaoToBauCu...) ---
        // Bạn hãy dán lại các hàm đó vào dưới này để code hoạt động đầy đủ.
    </script>
</body>
</html>
