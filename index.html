<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Báo Cáo Bầu Cử - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0d47a1; --success: #2e7d32; --danger: #d32f2f; --warning: #ef6c00; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .title-sm { text-align: center; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; font-weight: bold; }
        .btn-main { width: 100%; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .card-admin { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .status-on { color: var(--success); font-weight: bold; }
        .status-off { color: var(--danger); font-weight: bold; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loadingOverlay"><h2><i class="fas fa-spinner fa-spin"></i> ĐANG TẢI...</h2></div>

    <div class="container" id="loginView" style="display:none;">
        <h2 class="title-sm">HỆ THỐNG BẦU CỬ</h2>
        <input type="email" id="email" style="width:100%; padding:10px; margin:10px 0;" placeholder="Email">
        <input type="password" id="password" style="width:100%; padding:10px; margin:10px 0;" placeholder="Mật khẩu">
        <button id="btnLogin" class="btn-main" style="background: var(--primary);">ĐĂNG NHẬP</button>
    </div>

    <div id="dashboardView" style="display:none; padding:20px;">
        <h2 class="title-sm">DASHBOARD TỔNG HỢP</h2>
        <div id="adminTools" style="display:none; margin-bottom:20px;">
            <button onclick="showView('adminManagementView')" class="btn-main" style="background: var(--danger);">
                <i class="fas fa-user-shield"></i> QUẢN TRỊ HỆ THỐNG & TÀI KHOẢN
            </button>
        </div>
        <div id="dashboardContent">
            <p>Đang tải số liệu...</p>
        </div>
        <button onclick="auth.signOut()" class="btn-main" style="background: #666;">ĐĂNG XUẤT</button>
    </div>

    <div id="adminManagementView" style="display:none; padding:20px;">
        <h2 class="title-sm" style="color:var(--danger)">QUẢN LÝ QUYỀN TRUY CẬP</h2>
        
        <div class="card-admin" style="border-left-color: var(--warning);">
            <h3>CÔNG TẮC DASHBOARD</h3>
            <p>Khóa quyền xem Dashboard của tất cả Admin/UBBC khác.</p>
            <button id="btnLockDashboard" onclick="toggleGlobalLock('khoa_dashboard')" class="btn-main"></button>
        </div>

        <div class="card-admin">
            <h3>DANH SÁCH TÀI KHOẢN</h3>
            <table>
                <thead>
                    <tr><th>Tài khoản</th><th>Trạng thái</th><th>Thao tác</th></tr>
                </thead>
                <tbody id="userListTable"></tbody>
            </table>
        </div>
        <button onclick="showView('dashboardView')" class="btn-main" style="background:#666">QUAY LẠI DASHBOARD</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // CẤU HÌNH FIREBASE CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyBWPhJtIdk2sdBgDMrksneW7Lum7UywjFw",
            authDomain: "theodoi-2e7cb.firebaseapp.com",
            databaseURL: "https://theodoi-2e7cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "theodoi-2e7cb",
            appId: "1:415736271002:web:ea97b0f36d7f7a85418f23"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        // EMAIL ADMIN GỐC - BẠN HÃY ĐỔI EMAIL NÀY THÀNH CỦA BẠN
        const SUPER_ADMIN_EMAIL = "quantri_bt@binhthoi.tphcm.gov.vn";

        // CHUYỂN ĐỔI MÀN HÌNH
        function showView(id) {
            ['loginView', 'dashboardView', 'adminManagementView'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.style.display = (v === id ? 'block' : 'none');
            });
            if(id === 'adminManagementView') loadUserList();
        }

        // KIỂM TRA QUYỀN VÀ KHÓA REALTIME
        function setupSecurityListeners(user) {
            const emailKey = user.email.replace(/\./g, '_');

            // 1. Lắng nghe khóa Dashboard tổng
            db.ref('system_settings/khoa_dashboard').on('value', snap => {
                const isLocked = snap.val();
                const isAdminNotRoot = (user.email.includes('admin') || user.email.includes('ubbc')) && user.email !== SUPER_ADMIN_EMAIL;
                
                if (isLocked && isAdminNotRoot) {
                    alert("Trang Dashboard hiện đang bị Quản trị viên khóa.");
                    auth.signOut();
                }
                // Cập nhật nút bấm ở trang quản trị
                const btn = document.getElementById('btnLockDashboard');
                if(btn) {
                    btn.innerText = isLocked ? "MỞ KHÓA DASHBOARD" : "KHÓA DASHBOARD TỔNG";
                    btn.style.background = isLocked ? "var(--success)" : "var(--danger)";
                }
            });

            // 2. Lắng nghe khóa tài khoản cá nhân
            db.ref('user_status/' + emailKey + '/is_locked').on('value', snap => {
                if (snap.val() === true) {
                    alert("Tài khoản của bạn đã bị khóa.");
                    auth.signOut();
                }
            });
        }

        // QUẢN LÝ TÀI KHOẢN
        function toggleGlobalLock(field) {
            const ref = db.ref('system_settings/' + field);
            ref.once('value').then(snap => ref.set(!snap.val()));
        }

        function toggleUserLock(emailKey, currentState) {
            db.ref('user_status/' + emailKey + '/is_locked').set(!currentState);
        }

        function loadUserList() {
            // Lấy danh sách từ reports hoặc một danh sách user cố định
            db.ref('thong_tin_to').once('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const email = child.key.replace(/_/g, '.') + "@gmail.com"; // Giả định email
                    const emailKey = child.key;
                    
                    db.ref('user_status/' + emailKey + '/is_locked').on('value', lockSnap => {
                        const isLocked = lockSnap.val() || false;
                        const row = document.getElementById('row-' + emailKey);
                        const rowContent = `
                            <td>${email}</td>
                            <td class="${isLocked ? 'status-off' : 'status-on'}">${isLocked ? 'ĐÃ KHÓA' : 'MỞ'}</td>
                            <td><button onclick="toggleUserLock('${emailKey}', ${isLocked})" style="background:${isLocked?'green':'red'}; color:white; border:none; padding:5px; border-radius:4px;">${isLocked?'Mở':'Khóa'}</button></td>
                        `;
                        if(row) row.innerHTML = rowContent;
                        else html += `<tr id="row-${emailKey}">${rowContent}</tr>`;
                        document.getElementById('userListTable').innerHTML = html;
                    });
                });
            });
        }

        // THEO DÕI ĐĂNG NHẬP
        auth.onAuthStateChanged(user => {
            document.getElementById('loadingOverlay').style.display = 'none';
            if (user) {
                setupSecurityListeners(user);
                if (user.email === SUPER_ADMIN_EMAIL) {
                    document.getElementById('adminTools').style.display = 'block';
                    showView('dashboardView');
                } else if (user.email.includes('admin') || user.email.includes('ubbc')) {
                    showView('dashboardView');
                } else {
                    // Chuyển về màn hình báo cáo của Tổ (index.txt của bạn)
                    alert("Vào trang báo cáo của Tổ");
                }
            } else {
                showView('loginView');
            }
        });

        document.getElementById('btnLogin').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Sai thông tin!"));
        };
    </script>
</body>
</html>
