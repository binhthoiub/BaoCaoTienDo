<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Báo Cáo Bầu Cử Phường</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0d47a1; --success: #2e7d32; --danger: #d32f2f; --warning: #ef6c00; --bg: #f0f2f5; --white: #ffffff; --text-muted: #666666; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        
        .container { max-width: 400px; margin: 30px auto; background: white; padding: 25px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-main { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        
        /* CSS BỔ SUNG CHO TRANG QUẢN TRỊ */
        .admin-card { background: #fff; padding: 15px; border-radius: 10px; border-left: 5px solid var(--danger); margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .table-admin { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table-admin th, .table-admin td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .btn-lock { padding: 5px 10px; border: none; border-radius: 4px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loadingOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <h2><i class="fas fa-spinner fa-spin"></i> ĐANG TẢI...</h2>
    </div>

    <div id="dashboardView" style="display:none; padding:15px;">
        <div id="superAdminTool" style="display:none; margin-bottom:15px;">
            <button onclick="showView('adminManagementView')" class="btn-main" style="background:var(--danger)">
                <i class="fas fa-user-shield"></i> QUẢN TRỊ HỆ THỐNG
            </button>
        </div>
        </div>

    <div id="adminManagementView" style="display:none; padding:20px;">
        <h2 style="color:var(--danger); text-align:center;">HỆ THỐNG QUẢN TRỊ</h2>
        
        <div class="admin-card">
            <h3 style="margin-top:0; font-size:16px;">KHÓA DASHBOARD TỔNG</h3>
            <p style="font-size:13px; color:#666;">Chặn tất cả Admin/UBBC truy cập Dashboard (trừ bạn).</p>
            <button id="masterLockBtn" onclick="toggleMasterLock()" class="btn-main"></button>
        </div>

        <div class="admin-card" style="border-left-color: var(--primary);">
            <h3 style="margin-top:0; font-size:16px;">DANH SÁCH TÀI KHOẢN</h3>
            <table class="table-admin">
                <thead>
                    <tr><th>Tổ/Tài khoản</th><th>Trạng thái</th><th>Thao tác</th></tr>
                </thead>
                <tbody id="adminUserTable"></tbody>
            </table>
        </div>
        
        <button onclick="showView('dashboardView')" class="btn-main" style="background:#666">QUAY LẠI DASHBOARD</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // GIỮ NGUYÊN CONFIG CỦA BẠN
        const firebaseConfig = {
            apiKey: "AIzaSyBWPhJtIdk2sdBgDMrksneW7Lum7UywjFw",
            authDomain: "theodoi-2e7cb.firebaseapp.com",
            databaseURL: "https://theodoi-2e7cb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "theodoi-2e7cb",
            appId: "1:415736271002:web:ea97b0f36d7f7a85418f23"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        // 1. EMAIL SUPER ADMIN (Hãy đổi thành email của bạn)
        const MY_EMAIL = "admin@binhthoi.tphcm.gov.vn";

        // 2. LOGIC KHÓA TÀI KHOẢN & DASHBOARD REALTIME
        function batDauTheoDoiBaoMat(user) {
            const myKey = user.email.replace(/\./g, '_');

            // Theo dõi khóa Dashboard tổng
            db.ref('config/khoa_dashboard_tong').on('value', snap => {
                const isLocked = snap.val() || false;
                const isAdminKhac = (user.email.includes('admin') || user.email.includes('ubbc')) && user.email !== MY_EMAIL;
                
                if (isLocked && isAdminKhac) {
                    alert("Trang Dashboard đã bị khóa bởi Quản trị viên.");
                    auth.signOut();
                }

                // Cập nhật nút trong trang quản trị
                const btn = document.getElementById('masterLockBtn');
                if(btn) {
                    btn.innerText = isLocked ? "MỞ KHÓA DASHBOARD" : "KHÓA DASHBOARD TỔNG";
                    btn.style.background = isLocked ? "var(--success)" : "var(--danger)";
                }
            });

            // Theo dõi khóa tài khoản cá nhân
            db.ref('user_locks/' + myKey).on('value', snap => {
                if (snap.val() === true) {
                    alert("Tài khoản của bạn đã bị khóa truy cập.");
                    auth.signOut();
                }
            });
        }

        // 3. CÁC HÀM QUẢN TRỊ
        function toggleMasterLock() {
            const ref = db.ref('config/khoa_dashboard_tong');
            ref.once('value').then(snap => ref.set(!snap.val()));
        }

        function toggleUserLock(emailKey, currentState) {
            db.ref('user_locks/' + emailKey).set(!currentState);
        }

        function loadAccountManager() {
            db.ref('thong_tin_to').once('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const eKey = child.key;
                    const eName = eKey.replace(/_/g, '.') + "@gmail.com";
                    
                    db.ref('user_locks/' + eKey).on('value', lockSnap => {
                        const isLocked = lockSnap.val() || false;
                        const rowId = "row-" + eKey;
                        const rowContent = `
                            <td>${eName}</td>
                            <td style="color:${isLocked ? 'red' : 'green'}"><b>${isLocked ? 'BỊ KHÓA' : 'MỞ'}</b></td>
                            <td><button onclick="toggleUserLock('${eKey}', ${isLocked})" class="btn-lock" style="background:${isLocked?'#2e7d32':'#d32f2f'}">${isLocked?'Mở':'Khóa'}</button></td>
                        `;
                        const existingRow = document.getElementById(rowId);
                        if(existingRow) existingRow.innerHTML = rowContent;
                        else {
                            html += `<tr id="${rowId}">${rowContent}</tr>`;
                            document.getElementById('adminUserTable').innerHTML = html;
                        }
                    });
                });
            });
        }

        // 4. ĐIỀU CHỈNH HÀM AUTH STATE CỦA BẠN
        auth.onAuthStateChanged(user => {
            document.getElementById('loadingOverlay').style.display = 'none';
            if (user) {
                batDauTheoDoiBaoMat(user);
                
                if (user.email === MY_EMAIL) {
                    document.getElementById('superAdminTool').style.display = 'block';
                }

                // Giữ nguyên điều hướng cũ của bạn
                if (user.email.includes('admin') || user.email.includes('ubbc')) {
                    showView('dashboardView');
                    loadDashboard();
                } else {
                    showView('reportView');
                    khoiTaoToBauCu(user.email);
                }
            } else {
                showView('loginView');
            }
        });

        // HÀM CHUYỂN VIEW (BỔ SUNG THÊM VIEW MỚI)
        function showView(viewId) {
            ['loginView', 'reportView', 'dashboardView', 'adminManagementView'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.display = (id === viewId) ? 'block' : 'none';
            });
            if(viewId === 'adminManagementView') loadAccountManager();
        }

        // CÁC HÀM loadDashboard(), khoiTaoToBauCu()... GIỮ NGUYÊN NHƯ FILE index.txt CỦA BẠN
    </script>
</body>
</html>
